<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wrong Way!</title>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>

/* ── Variables ── */
:root {
  --hot-pink:  #ff2d78;
  --neon-yell: #ffe600;
  --electric:  #00f0ff;
  --lime:      #39ff14;
  --purple:    #bf00ff;
  --bg:        #0d0d0d;
  --card:      #1a1a2e;
}

/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Body — dark funhouse ── */
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow: hidden;
  position: relative;
}

/* ── Animated disco background grid ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,240,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridScroll 8s linear infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes gridScroll {
  from { transform: translateY(0); }
  to   { transform: translateY(40px); }
}

/* ── Floating confetti blobs ── */
body::after {
  content: '★ ✦ ● ◆ ★ ✦ ● ◆ ★ ✦';
  position: fixed;
  top: -60px;
  left: 0; right: 0;
  font-size: 22px;
  letter-spacing: 60px;
  color: var(--neon-yell);
  white-space: nowrap;
  animation: confettiFall 4s linear infinite;
  pointer-events: none;
  z-index: 0;
  text-shadow:
    80px 0 var(--hot-pink),
    160px 0 var(--electric),
    240px 0 var(--lime),
    320px 0 var(--purple);
}

@keyframes confettiFall {
  0%   { transform: translateY(-60px) rotate(0deg);   opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg);  opacity: 0.4; }
}

/* ── Orbiting neon circles ── */
.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(60px);
}

.orb-1 {
  width: 300px; height: 300px;
  background: rgba(255,45,120,0.25);
  top: -80px; left: -60px;
  animation: orbFloat 7s ease-in-out infinite;
}

.orb-2 {
  width: 250px; height: 250px;
  background: rgba(0,240,255,0.2);
  bottom: -60px; right: -40px;
  animation: orbFloat 9s ease-in-out infinite reverse;
}

.orb-3 {
  width: 180px; height: 180px;
  background: rgba(191,0,255,0.2);
  top: 40%; left: -80px;
  animation: orbFloat 6s ease-in-out infinite 2s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0,0) scale(1); }
  50%       { transform: translate(30px, -40px) scale(1.15); }
}

/* ── Main card ── */
.container {
  position: relative;
  z-index: 1;
  background: var(--card);
  border-radius: 28px;
  padding: 48px 40px 44px;
  text-align: center;
  max-width: 420px;
  width: 100%;
  border: 3px solid transparent;
  background-clip: padding-box;
  box-shadow:
    0 0 0 3px var(--hot-pink),
    0 0 40px rgba(255,45,120,0.4),
    0 0 80px rgba(0,240,255,0.15),
    0 20px 60px rgba(0,0,0,0.6);
  animation:
    cardBounceIn 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both,
    cardWobble 3.5s 1s ease-in-out infinite;
}

@keyframes cardBounceIn {
  0%   { opacity: 0; transform: scale(0.4) rotate(-8deg); }
  70%  { opacity: 1; transform: scale(1.06) rotate(2deg); }
  100% { transform: scale(1) rotate(0deg); }
}

@keyframes cardWobble {
  0%, 100% { transform: rotate(0deg) scale(1); }
  20%       { transform: rotate(-1.2deg) scale(1.01); }
  40%       { transform: rotate(1deg) scale(1.005); }
  60%       { transform: rotate(-0.6deg) scale(1.008); }
  80%       { transform: rotate(0.4deg) scale(1); }
}

/* Rotating rainbow border using pseudo-element */
.container::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 32px;
  background: conic-gradient(
    var(--hot-pink),
    var(--neon-yell),
    var(--lime),
    var(--electric),
    var(--purple),
    var(--hot-pink)
  );
  z-index: -1;
  animation: spinBorder 3s linear infinite;
}

@keyframes spinBorder {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* Inner card fill to mask the conic border */
.container::after {
  content: '';
  position: absolute;
  inset: 3px;
  border-radius: 26px;
  background: var(--card);
  z-index: -1;
}

/* ── Cat GIF ── */
.emoji {
  display: block;
  margin: 0 auto 12px;
  width: 160px;
  height: 160px;
  object-fit: contain;
  border-radius: 20px;
  animation:
    emojiBounce 0.7s 0.4s cubic-bezier(0.34, 1.8, 0.64, 1) both,
    emojiWiggle 2.5s 1.3s ease-in-out infinite;
  filter:
    drop-shadow(0 0 18px rgba(255,230,0,0.7))
    drop-shadow(0 0 40px rgba(255,45,120,0.4));
}

@keyframes emojiBounce {
  0%   { opacity: 0; transform: scale(0) rotate(-180deg); }
  70%  { opacity: 1; transform: scale(1.12) rotate(8deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

@keyframes emojiWiggle {
  0%, 100% { transform: scale(1) rotate(0deg); }
  20%       { transform: scale(1.08) rotate(-6deg); }
  40%       { transform: scale(1.1) rotate(6deg); }
  60%       { transform: scale(1.05) rotate(-3deg); }
  80%       { transform: scale(1.03) rotate(2deg); }
}

/* ── H1 "Oops!" ── */
h1 {
  font-family: 'Fredoka One', cursive;
  font-size: 68px;
  line-height: 1;
  margin-bottom: 12px;
  background: linear-gradient(135deg, var(--hot-pink) 0%, var(--neon-yell) 50%, var(--electric) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200% 200%;
  animation:
    slideInLeft 0.5s 0.6s ease both,
    gradientShift 3s 1.2s ease-in-out infinite;
  letter-spacing: -1px;
  filter: drop-shadow(0 4px 0 rgba(255,45,120,0.4));
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-40px) skewX(-8deg); }
  to   { opacity: 1; transform: translateX(0) skewX(0); }
}

@keyframes gradientShift {
  0%, 100% { background-position: 0% 50%; }
  50%       { background-position: 100% 50%; }
}

/* ── H2 ── */
h2 {
  font-family: 'Boogaloo', cursive;
  font-size: 28px;
  color: var(--neon-yell);
  margin-bottom: 18px;
  letter-spacing: 0.06em;
  animation: slideInRight 0.5s 0.75s ease both;
  text-shadow:
    0 0 10px rgba(255,230,0,0.8),
    0 0 30px rgba(255,230,0,0.4);
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px) skewX(8deg); }
  to   { opacity: 1; transform: translateX(0) skewX(0); }
}

/* ── Divider ── */
.divider {
  width: 80px;
  height: 4px;
  margin: 0 auto 18px;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--hot-pink), var(--electric), var(--lime));
  background-size: 200%;
  animation:
    fadeInUp 0.4s 0.9s ease both,
    gradientShift 2s 1.3s linear infinite;
}

/* ── Paragraph ── */
p {
  font-family: 'Nunito', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: rgba(255,255,255,0.82);
  line-height: 1.65;
  animation: fadeInUp 0.5s 0.9s ease both;
  letter-spacing: 0.01em;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Bouncing arrow row below text ── */
.arrows {
  margin-top: 24px;
  font-size: 26px;
  display: flex;
  justify-content: center;
  gap: 10px;
  animation: fadeInUp 0.5s 1.1s ease both;
}

.arrows span {
  display: inline-block;
  animation: arrowBounce 0.8s ease-in-out infinite;
  color: var(--lime);
  text-shadow: 0 0 12px var(--lime);
}

.arrows span:nth-child(2) { animation-delay: 0.15s; color: var(--electric); text-shadow: 0 0 12px var(--electric); }
.arrows span:nth-child(3) { animation-delay: 0.30s; color: var(--hot-pink); text-shadow: 0 0 12px var(--hot-pink); }

@keyframes arrowBounce {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

/* ── Tap hint ── */
.tap-hint {
  margin-top: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  animation: fadeInUp 0.5s 1.3s ease both;
}

.tap-hand {
  font-size: 42px;
  display: inline-block;
  animation: tapBounce 0.9s ease-in-out infinite;
  transform-origin: bottom center;
  filter: drop-shadow(0 0 12px rgba(255,230,0,0.8));
}

.tap-text {
  font-family: 'Fredoka One', cursive;
  font-size: 20px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--neon-yell), var(--lime));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.02em;
  text-align: center;
  line-height: 1.3;
  filter: drop-shadow(0 0 8px rgba(255,230,0,0.5));
  animation: tapTextPulse 1.5s ease-in-out infinite;
}

@keyframes tapBounce {
  0%, 100% { transform: translateY(0) scale(1); }
  40%       { transform: translateY(-10px) scale(1.2); }
  60%       { transform: translateY(0) scale(0.92); }
}

@keyframes tapTextPulse {
  0%, 100% { opacity: 1; filter: drop-shadow(0 0 8px rgba(255,230,0,0.5)); }
  50%       { opacity: 0.75; filter: drop-shadow(0 0 18px rgba(57,255,20,0.7)); }
}



    </style>
</head>
<body>

  <!-- Neon orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="container">
      <img class="emoji" src="/images/cat.gif" alt="Laughing cat">
      <h1>Oops!</h1>
      <h2>Wrong QR Code!</h2>
      <div class="divider"></div>
      <p>This QR code is a diversion.<br>Ag scan ka sabali nga QR code</p>
      <div class="arrows">
        <span>↗</span><span>↗</span><span>↗</span>
      </div>
      <div class="tap-hint">
        <span class="tap-hand">👆</span>
        <span class="tap-text">Double-tap the screen<br>to get Bonus Points!</span>
      </div>
  </div>

  <!-- Hidden audio element -->
  <audio id="bgMusic" loop></audio>

  <script>
    const AUDIO_KEY = 'wrongway_catsound_v1';
    const AUDIO_SRC = '/mp3/cat-sound.mp3';
    const audio     = document.getElementById('bgMusic');
    let started     = false;
    let tapCount    = 0;
    let tapTimer    = null;

    /* ── Load audio: from localStorage cache or fetch fresh ── */
    async function loadAudio() {
      try {
        const cached = localStorage.getItem(AUDIO_KEY);
        if (cached) {
          audio.src = cached;
        } else {
          const response = await fetch(AUDIO_SRC);
          const blob     = await response.blob();
          const reader   = new FileReader();
          reader.onloadend = () => {
            const base64 = reader.result;
            try {
              localStorage.setItem(AUDIO_KEY, base64);
            } catch (e) {
              console.warn('localStorage full — playing without cache:', e);
            }
            audio.src = base64;
          };
          reader.readAsDataURL(blob);
        }
      } catch (err) {
        console.warn('Cache load failed, using direct src:', err);
        audio.src = AUDIO_SRC;
      }
    }

    /* ── Double-tap anywhere to play/pause ── */
    document.addEventListener('pointerdown', () => {
      tapCount++;

      if (tapTimer) clearTimeout(tapTimer);

      tapTimer = setTimeout(() => {
        tapCount = 0; // reset if second tap didn't come in time
      }, 300);

      if (tapCount >= 2) {
        tapCount = 0;
        clearTimeout(tapTimer);

        if (!started) {
          // First double-tap — start audio
          started = true;
          audio.play().catch(() => { started = false; });
          document.querySelector('.tap-hint').style.display = 'none';
        } else {
          // Subsequent double-taps — toggle pause/play
          if (audio.paused) {
            audio.play().catch(() => {});
          } else {
            audio.pause();
          }
        }
      }
    });

    /* ── Init ── */
    loadAudio();
  </script>

</body>
</html>
