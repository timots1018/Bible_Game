<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Story Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Quiz Section -->
        <div id="quizSection">
            <h1>Guess the Bible Character!</h1>
            
            <div class="image-grid">
                <div class="image-box">
                    <img src="/images/a1.jpg" alt="Hint 1">
                    <div class="image-description">40 Days & Nights of Rain</div>
                </div>
                <div class="image-box">
                    <img src="/images/a2.png" alt="Hint 2">
                    <div class="image-description">Two of Every Animal</div>
                </div>
                <div class="image-box">
                    <img src="/images/a3.png" alt="Hint 3">
                    <div class="image-description">A Large Wooden Boat</div>
                </div>
                <div class="image-box">
                    <img src="/images/a4.png" alt="Hint 4">
                    <div class="image-description">God's Promise in the Sky</div>
                </div>
            </div>

            <div class="answer-section">
                <div class="input-group">
                    <input type="text" id="answerInput" placeholder="Enter the Bible character name...">
                    <button onclick="checkAnswer()">Submit</button>
                </div>
                <div class="error-message" id="errorMessage">Incorrect! Try again.</div>
            </div>
        </div>

        <!-- Reveal Section (Hidden by default) -->
        <div id="revealSection" class="reveal-content">
            <h2>✝️ Correct!</h2>
           <p>ark</p>
        </div>
    </div>

    <script>
        // Configuration - Change these values
        const CORRECT_ANSWER = "noah"; // Set your correct answer here (case-insensitive)
        const REVEAL_TEXT = "SERPENT";

        function checkAnswer() {
            const userAnswer = document.getElementById('answerInput').value.trim().toLowerCase();
            const errorMessage = document.getElementById('errorMessage');
            
            // Check if answer is correct (case-insensitive)
            if (userAnswer === CORRECT_ANSWER.toLowerCase()) {
                // Hide quiz section
                document.getElementById('quizSection').classList.add('hidden');
                
                // Update and show reveal section
                document.querySelector('.reveal-content p').textContent = REVEAL_TEXT;
                document.getElementById('revealSection').style.display = 'block';
                
                // Hide error message
                errorMessage.style.display = 'none';
            } else {
                // Show error message
                errorMessage.style.display = 'block';
                
                // Shake animation
                errorMessage.style.animation = 'none';
                setTimeout(() => {
                    errorMessage.style.animation = 'shake 0.5s';
                }, 10);
            }
        }

        // Allow Enter key to submit
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('answerInput').addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    checkAnswer();
                }
            });
        });
    </script>
</body>
</html>
